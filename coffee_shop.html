<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Java Haven</title>
  
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
    
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    grid-template-areas: 
      "header"
      "nav"
      "main"
      "footer";
      min-height: 100vh;
    }
    .header {
      grid-area: header;
      background-color: #e7a474;
      color: white;
      padding: 20px;  
      text-align: center;
    }
    .nav {
      grid-area: nav;
      background-color: #411c01;
      padding: 10px;
    }
    .nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }
    .nav li {
      margin: 0 15px;
    }
    .nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
    .main-content {
      grid-area: main;
      padding: 20px;
    }
    .flex-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: space-evenly;
      align-items: center;
    }
    .flex-item {
      background-color: #c57737;
      padding: 20px;
      flex: 1 1 calc(25% - 40px);
      text-align: center;
      border-radius: 8px;
    }
    .footer {
      grid-area: footer;
      background-color: #411c01;
      color: white;
      text-align: center;
      padding: 10px;
    }

  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>Java Haven</h1>
    <p>Your daily dose of caffeine and comfort.</p>
  </header>
  
  <nav class="nav">
    <ul>
      <li><a href="#menu">Menu</a></li>
      <li><a href="#about">About Us</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
  
  <main class="main-content">
    <h2>Featured Coffees</h2>
    <div class="flex-container">
      <div class="flex-item">Espresso</div>
      <div class="flex-item">Cappuccino</div>
      <div class="flex-item">Latte</div>
      <div class="flex-item">Mocha</div>
    </div>
  </main>
  
  <footer class="footer">
    <p>&copy; 2025 Java Haven. All Rights Reserved.</p>
  </footer>
</body>
</html>
