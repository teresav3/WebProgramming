<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Box Model Lab</title>
<style>
/* CSS styling */
.box {
  border: 5px solid blue;
  padding: 20px;
  margin: 20px auto;
  box-sizing: border-box;
    width: 300px; /*sets a fixed width to box, contents are adjusted to fit within the box*/
  background-color: lightgray;
  /* Experiment with width and height*/
  height: 150px;
  width: 400px;
}
</style>
</head>
<body>
<h1>CSS Box Model Lab</h1>
<div class="box">
    <p>This is a demonstration of the CSS Box Model.</p>
</div>
<div class="box">
    <p>This is another box added with the same class to see how the margin affects spacing between elements.</p>
</body>
</html>
